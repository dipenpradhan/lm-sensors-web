name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version (e.g., 0.1.0)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no publish)'
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: lm-sensors-web

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Determine Version ──────────────────────────────────────
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            CURRENT=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${VERSION}"

  # ── Build Binaries ─────────────────────────────────────────
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: version
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsensors-dev libclang-dev pkg-config

      - name: Add target
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: rustup target add ${{ matrix.target }}

      - name: Build release
        run: |
          cargo build --release --target ${{ matrix.target }}
          BINARY="target/${{ matrix.target }}/release/lm-sensors-web"
          NAME="lm-sensors-web-${{ needs.version.outputs.version }}-${{ matrix.target }}"
          mkdir -p dist
          cp "$BINARY" "dist/$NAME"
          echo "NAME=$NAME" >> "$GITHUB_OUTPUT"

      - name: Create tarball with checksums
        run: |
          cd dist
          for f in lm-sensors-web-*.linux*; do
            sha256sum "$f" > "${f}.sha256"
            tar czf "${f}.tar.gz" "$f"
            sha256sum "${f}.tar.gz" > "${f}.tar.gz.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/
          retention-days: 7

  # ── Docker Image ───────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── GitHub Release ─────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build]
    if: github.event_name == 'push' || !inputs.dry_run
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries-x86_64-unknown-linux-gnu
          path: dist/

      - name: Download aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries-aarch64-unknown-linux-gnu
          path: dist/
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/lm-sensors-web-*.tar.gz
            dist/lm-sensors-web-*.sha256
            dist/lm-sensors-web-*.linux*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to crates.io ────────────────────────────────────
  crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [version, build]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Update version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ needs.version.outputs.version }}\"/" Cargo.toml

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "No crates.io token configured, skipping publish"
            exit 0
          fi
          cargo publish --allow-dirty