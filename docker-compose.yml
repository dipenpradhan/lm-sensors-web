services:
  lm-sensors-web:
    build: .
    container_name: lm-sensors-web
    restart: unless-stopped
    user: "nobody"
    ports:
      - "127.0.0.1:47890:47890"
    volumes:
      - ./config.example.json:/etc/lm-sensors-web/config.json:ro
    environment:
      - RUST_LOG=info
    # Access to /sys/class/hwmon for sensor reads (host mode needed for real data)
    # Uncomment the next two lines for real sensor access:
    # pid: host
    # volumes:
    #   - /sys:/sys:ro