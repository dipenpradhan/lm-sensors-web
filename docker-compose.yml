services:
  lm-sensors-api:
    build: .
    container_name: lm-sensors-api
    restart: unless-stopped
    ports:
      - "47890:47890"
    volumes:
      - ./config.example.json:/etc/lm-sensors-api/config.json:ro
    environment:
      - RUST_LOG=info
      - CONFIG_PATH=/etc/lm-sensors-api/config.json
    # Access to /sys/class/hwmon for sensor reads (host mode needed for real data)
    # Uncomment the next two lines for real sensor access:
    # pid: host
    # volumes:
    #   - /sys:/sys:ro
