<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="lm-sensors-web — real-time hardware sensor monitoring dashboard">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#1a1b2e">
  <title>lm-sensors-web</title>
  <style>:root{--bg:#1a1b2e;--surface:#242640;--surface-hi:#2e3050;--text:#c8c9e0;--text-dim:#7a7d9a;--accent:#7eb8da;--border:#383b58;--radius:10px;--focus-ring:0 0 0 2px var(--accent);--temp:#f4a8a8;--volt:#a8e6cf;--current:#f7d98e;--power:#c5a8f7;--energy:#8ed6f7;--rpm:#a8f7c3;--percent:#f7c3a8;--other:#b8b8d0;}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}html{height:100%;-webkit-text-size-adjust:100%;}body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.45;min-height:100%;}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}header{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 2rem;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;}header h1{font-size:1.25rem;font-weight:600;color:var(--accent);letter-spacing:-0.02em;}.controls{display:flex;align-items:center;gap:1rem;}#filter{background:var(--surface-hi);border:1px solid var(--border);border-radius:var(--radius);padding:.5rem .85rem;color:var(--text);font-size:.875rem;width:260px;outline:none;transition:border-color .2s;}#filter:focus-visible{border-color:var(--accent);box-shadow:var(--focus-ring);}#filter::placeholder{color:var(--text-dim);}.status{display:flex;align-items:center;gap:.45rem;font-size:.8rem;color:var(--text-dim);}.status .dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);transition:background .3s;}.status.connected .dot{background:#66e07e;box-shadow:0 0 6px #66e07e88;}.status.disconnected .dot{background:#e06666;box-shadow:0 0 6px #e0666688;}main{padding:1.5rem 2rem 3rem;}#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem;}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .2s,transform .2s;}.card:hover{box-shadow:0 2px 12px #0008;}.card-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;cursor:pointer;user-select:none;list-style:none;font:inherit;color:inherit;background:none;border:none;width:100%;text-align:left;}.card-header:hover,.card-header:focus-visible{background:var(--surface-hi);}.card-title{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%;}.card-meta{font-size:.75rem;color:var(--text-dim);margin-left:auto;padding-left:1rem;}.card-chevron{transition:transform .2s;color:var(--text-dim);font-size:.7rem;flex-shrink:0;margin-left:.5rem;}.card.expanded .card-chevron{transform:rotate(180deg);}.card-body{display:none;border-top:1px solid var(--border);}.card.expanded .card-body{display:block;}.feature{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem;border-bottom:1px solid var(--border);font-size:.825rem;}.feature:last-child{border-bottom:none;}.feature-name{color:var(--text-dim);font-weight:500;}.feature-val{font-variant-numeric:tabular-nums;font-weight:600;}.feature-val.temp{color:var(--temp);}.feature-val.volt{color:var(--volt);}.feature-val.current{color:var(--current);}.feature-val.power{color:var(--power);}.feature-val.energy{color:var(--energy);}.feature-val.rpm{color:var(--rpm);}.feature-val.percent{color:var(--percent);}.feature-val.other{color:var(--other);}.empty{grid-column:1 / -1;text-align:center;padding:3rem 1rem;color:var(--text-dim);font-size:.9rem;}::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}@media (prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:0.01ms !important;animation-duration:0.01ms !important;}}@media (max-width:600px){header{padding:1rem;}main{padding:1rem;}#filter{width:100%;}#grid{grid-template-columns:1fr;}}</style>
</head>
<body>
  <header>
    <h1>lm-sensors-web</h1>
    <div class="controls">
      <label class="sr-only" for="filter">Filter devices and features</label>
      <input
        type="search"
        id="filter"
        placeholder="Filter devices / features…"
        autocomplete="off"
        spellcheck="false"
      >
      <div class="status" id="status" role="status" aria-live="polite">
        <span class="dot"></span>
        <span class="label">Connecting…</span>
      </div>
    </div>
  </header>

  <main>
    <section id="grid" aria-label="Sensor devices"></section>
  </main>

  <script>(() => {   'use strict';     const grid   = document.getElementById('grid');   const filter = document.getElementById('filter');   const status = document.getElementById('status');   let ws       = null;   let wsUrl    = null;   let wsTimer  = null;   let reconnectMs = 1500;   const devices = new Map();      function debounce(fn, ms) {     let t;     return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };   }     function esc(s) {     const d = document.createElement('div');     d.textContent = String(s);     return d.innerHTML;   }     function unitClass(unit) {     if (!unit) return 'other';     const u = unit.toLowerCase();     if (u.includes('°c') || u.includes('°f') || u === 'k') return 'temp';     if (u === 'v') return 'volt';     if (u === 'a') return 'current';     if (u === 'w') return 'power';     if (u === 'j') return 'energy';     if (u.includes('rpm')) return 'rpm';     if (u === '%') return 'percent';     return 'other';   }     function renderCard(dev) {     const d = dev.device;     const features = dev.features || [];     const id = d.name;     const q  = filter.value.toLowerCase();     let el = grid.querySelector(`[data-device="${CSS.escape(id)}"]`);     if (!el) {       el = document.createElement('article');       el.className = 'card expanded';       el.setAttribute('data-device', id);       el.innerHTML = `
        <button class="card-header" aria-expanded="true" aria-label="Toggle ${esc(d.name)}">
          <span class="card-title">${esc(d.name)}</span>
          <span class="card-meta">${esc(d.bus)}</span>
          <span class="card-chevron" aria-hidden="true">▼</span>
        </button>
        <div class="card-body"></div>`;       const btn = el.querySelector('.card-header');       btn.addEventListener('click', () => {         const expanded = el.classList.toggle('expanded');         btn.setAttribute('aria-expanded', String(expanded));       });       grid.appendChild(el);     }         const body = el.querySelector('.card-body');     const rows = features.flatMap(f => {       const fname = f.name.toLowerCase();       if (q && !d.name.toLowerCase().includes(q) && !fname.includes(q)) return [];       return (f.sub_features || []).map(s => {         if (q && !s.name.toLowerCase().includes(q) && !d.name.toLowerCase().includes(q)) return null;         const uc = unitClass(s.unit);         const val = s.value != null ? `${s.value} ${s.unit || ''}` : '\u2014';         return `<div class="feature"><span class="feature-name">${esc(s.name)}</span><span class="feature-val ${uc}">${esc(val)}</span></div>`;       }).filter(Boolean);     }).join('');     body.innerHTML = rows || '<div class="empty">No readable features</div>';   }     function applyFilter() {     const q = filter.value.toLowerCase();         for (const [name, dev] of devices) {       renderCard(dev);     }         grid.querySelectorAll('.card').forEach(el => {       if (!q) { el.style.display = ''; return; }       const name = el.getAttribute('data-device').toLowerCase();       const visible = name.includes(q) ||         [...el.querySelectorAll('.feature-name')].some(n => n.textContent.toLowerCase().includes(q));       el.style.display = visible ? '' : 'none';     });   }     function onReadings(data) {     const devList = data.devices || [];     devList.forEach(d => devices.set(d.device.name, d));     devices.forEach(d => renderCard(d));     if (devices.size === 0) {       grid.innerHTML = '<div class="empty">No sensors detected</div>';     }   }     function connectWS() {     if (!wsUrl) return;         if (ws) {       ws.onmessage = ws.onerror = ws.onclose = null;       try { ws.close(); } catch(_) {}     }     ws = new WebSocket(wsUrl);     ws.binaryType = 'text';     ws.onmessage = e => {       try { onReadings(JSON.parse(e.data)); }       catch (_) {}     };     ws.onerror = () => {  };     ws.onclose = () => {       status.className = 'status disconnected';       status.querySelector('.label').textContent = 'Disconnected';             reconnectMs = Math.min(reconnectMs * 1.5, 30_000);       wsTimer = setTimeout(connectWS, reconnectMs);     };     ws.onopen = () => {       status.className = 'status connected';       status.querySelector('.label').textContent = 'Live';       reconnectMs = 1500;     };   }     async function pollOnce() {     try {       const r = await fetch('/api/sensors');       if (!r.ok) return;       onReadings(await r.json());     } catch (_) {  }   }     function cleanup() {     if (wsTimer) clearTimeout(wsTimer);     if (ws) {       ws.onmessage = ws.onerror = ws.onclose = null;       try { ws.close(); } catch(_) {}     }   }     function init() {     const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';     wsUrl = `${protocol}//${location.host}/ws/sensors`;     filter.addEventListener('input', debounce(applyFilter, 150));     window.addEventListener('beforeunload', cleanup);         connectWS();     pollOnce();         setInterval(pollOnce, 30_000);   }   if (document.readyState !== 'loading') init();   else document.addEventListener('DOMContentLoaded', init); })();</script>
</body>
</html>
